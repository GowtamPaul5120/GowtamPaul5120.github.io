backend:
  name: github
  repo: GowtamPaul5120/GowtamPaul5120.github.io
  branch: development
  base_url: https://platformnx-cms-auth.gowtampaul16.workers.dev
  auth_endpoint: /auth

media_folder: static/img
public_folder: /img

collections:
  - name: docs
    label: Documentation
    folder: docs
    create: true
    extension: md
    format: frontmatter
    nested:
      depth: 5
    fields:
      - { label: Title, name: title, widget: string }
      - {
          label: Sidebar Position,
          name: sidebar_position,
          widget: number,
          required: false,
        }
      - { label: Body, name: body, widget: markdown }

  - name: blog
    label: Blog
    folder: blog
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Body, name: body, widget: markdown }
