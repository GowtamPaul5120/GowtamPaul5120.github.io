<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/infima/dist/css/default/default.css"
    />
  </head>
  <body>
    <script src="https://unpkg.com/@staticcms/app@^4.0.0/dist/static-cms-app.umd.js"></script>
    <script>
      StaticCMS.registerPreviewStyle(
        "https://unpkg.com/infima/dist/css/default/default.css",
      );
      StaticCMS.registerPreviewStyle("/css/custom.css");

      var DocsPreview = StaticCMS.definePreviewComponent(function (props) {
        return StaticCMS.h(
          "div",
          {
            style: {
              padding: "2rem",
              fontFamily: "var(--ifm-font-family-base, system-ui)",
              maxWidth: "860px",
              margin: "0 auto",
            },
          },
          StaticCMS.h(
            "article",
            { className: "theme-doc-markdown markdown" },
            StaticCMS.h(
              "header",
              {},
              StaticCMS.h("h1", {}, props.entry.data.title),
              props.entry.data.description
                ? StaticCMS.h("p", {}, props.entry.data.description)
                : null,
            ),
            StaticCMS.h(
              "div",
              { className: "markdown" },
              props.widgetFor("body"),
            ),
          ),
        );
      });

      StaticCMS.registerPreviewTemplate("docs", DocsPreview);

      StaticCMS.init();
    </script>
  </body>
</html>
